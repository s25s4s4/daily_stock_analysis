name: 每日股票分析（两阶段选股）

on:
  # 定时触发 - 每天北京时间 15:30 (UTC 07:30) 收盘后先选股，18:00再分析
  schedule:
    - cron: '0 7 * * 1-5'     # 周一到周五，UTC 07:30 = 北京时间 15:30
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整流程（选股+AI精选+分析+大盘）
          - screener-only # 仅第一阶段选股
          - ai-only       # 仅第二阶段AI精选
          - analysis-only # 仅分析（使用已选股票）
          - market-only   # 仅大盘复盘
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  # ==========================================
  # 第一阶段：量化筛选（全市场→200只）
  # ==========================================
  screener:
    runs-on: ubuntu-latest
    if: github.event.inputs.mode == '' || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'screener-only'
    timeout-minutes: 20
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare pandas numpy
      
      - name: 创建数据目录
        run: mkdir -p data logs reports
      
      - name: 执行第一阶段量化筛选
        run: |
          echo "=========================================="
          echo "📊 第一阶段：全市场量化筛选"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          python stock_screener.py
      
      - name: 上传筛选结果
        uses: actions/upload-artifact@v6
        with:
          name: screener-result
          path: |
            data/screener_result.json
            data/screener_codes.txt
          retention-days: 7
      
      - name: 显示筛选结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 第一阶段筛选完成"
          echo "=========================================="
          if [ -f "data/screener_result.json" ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('data/screener_result.json')); print(d['count'])")
            echo "✅ 筛选出 ${COUNT} 只候选股票"
            echo "📋 前10只:"
            python3 -c "
          import json
          d = json.load(open('data/screener_result.json'))
          for s in d['stocks'][:10]:
              print(f\"  {s['code']} {s['name']:8s} 价格:{s['price']:8.2f} 涨跌:{s['change_pct']:+6.2f}% 量比:{s['volume_ratio']:5.2f} 换手:{s['turnover_rate']:5.2f}% 得分:{s['score']:5.1f}\")
          "
          else
            echo "⚠️ 未生成筛选结果"
          fi

  # ==========================================
  # 第二阶段：AI精选（200只→10只）
  # ==========================================
  ai-selector:
    runs-on: ubuntu-latest
    needs: screener
    if: github.event.inputs.mode == '' || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'ai-only'
    timeout-minutes: 10
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install litellm pandas numpy
      
      - name: 创建数据目录
        run: mkdir -p data logs reports
      
      - name: 下载第一阶段结果
        uses: actions/download-artifact@v6
        with:
          name: screener-result
          path: data/
      
      - name: 执行第二阶段AI精选
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
        run: |
          echo "=========================================="
          echo "🤖 第二阶段：AI精选"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          
          # 检查第一阶段结果是否存在
          if [ ! -f "data/screener_result.json" ]; then
            echo "❌ 找不到第一阶段筛选结果"
            exit 1
          fi
          
          python ai_selector.py
      
      - name: 上传AI精选结果
        uses: actions/upload-artifact@v6
        with:
          name: ai-selected-result
          path: |
            data/ai_selected_stocks.json
            data/ai_selected_codes.txt
            reports/ai_selection_report.md
          retention-days: 7
      
      - name: 显示AI精选结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "🤖 第二阶段AI精选完成"
          echo "=========================================="
          if [ -f "reports/ai_selection_report.md" ]; then
            echo "📄 AI精选报告已生成"
            echo ""
            cat reports/ai_selection_report.md
          else
            echo "⚠️ 未生成AI精选报告"
          fi

  # ==========================================
  # 第三阶段：详细分析（10只精选股票）
  # ==========================================
  analyze:
    runs-on: ubuntu-latest
    needs: [screener, ai-selector]
    if: github.event.inputs.mode == '' || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'analysis-only'
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}
    environment: STOCK_LIST
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 下载AI精选结果
        uses: actions/download-artifact@v6
        with:
          name: ai-selected-result
          path: data/
      
      - name: 下载筛选结果（备用）
        uses: actions/download-artifact@v6
        with:
          name: screener-result
          path: data/
        continue-on-error: true
      
      - name: 执行股票详细分析
        env:
          # AI 配置
          GENERATION_BACKEND: ${{ vars.GENERATION_BACKEND || secrets.GENERATION_BACKEND }}
          GENERATION_FALLBACK_BACKEND: ${{ vars.GENERATION_FALLBACK_BACKEND || secrets.GENERATION_FALLBACK_BACKEND || 'litellm' }}
          GENERATION_BACKEND_TIMEOUT_SECONDS: ${{ vars.GENERATION_BACKEND_TIMEOUT_SECONDS || secrets.GENERATION_BACKEND_TIMEOUT_SECONDS }}
          GENERATION_BACKEND_MAX_OUTPUT_BYTES: ${{ vars.GENERATION_BACKEND_MAX_OUTPUT_BYTES || secrets.GENERATION_BACKEND_MAX_OUTPUT_BYTES }}
          GENERATION_BACKEND_MAX_CONCURRENCY: ${{ vars.GENERATION_BACKEND_MAX_CONCURRENCY || secrets.GENERATION_BACKEND_MAX_CONCURRENCY }}
          LOCAL_CLI_BACKEND_MAX_CONCURRENCY: ${{ vars.LOCAL_CLI_BACKEND_MAX_CONCURRENCY || secrets.LOCAL_CLI_BACKEND_MAX_CONCURRENCY }}
          AGENT_GENERATION_BACKEND: ${{ vars.AGENT_GENERATION_BACKEND || secrets.AGENT_GENERATION_BACKEND }}
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
